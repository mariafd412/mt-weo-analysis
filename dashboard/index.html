<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Dashboard Riesgos Globales</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>

<body>

<div class="container py-4">

  <h1 class="mb-3">Vigilancia de riesgos globales</h1>
  <p class="text-muted">Análisis automático de informes WEO mediante minería de texto</p>

  <!-- KPIs -->
  <div class="row text-center my-4">
    <div class="col-md-4">
        <div class="card p-3">
        <div class="kpi kpi-neutral" id="neutral">--</div>
        <small class="text-muted">Neutral</small>
        </div>
    </div>

    <div class="col-md-4">
        <div class="card p-3">
        <div class="kpi kpi-positive" id="positivo">--</div>
        <small class="text-muted">Positivo</small>
        </div>
    </div>

    <div class="col-md-4">
        <div class="card p-3">
        <div class="kpi kpi-negative" id="negativo">--</div>
        <small class="text-muted">Negativo</small>
        </div>
    </div>
  </div>

  <!-- Gráficos -->
  <div class="row">
    <div class="col-md-6">
      <div class="card p-3 shadow-sm">
        <h5>Distribución de Sentimiento</h5>
        <canvas id="sentimentChart"></canvas>
      </div>
    </div>

    <div class="col-md-6">
      <div class="card p-3 shadow-sm">
        <h5>Tópicos principales</h5>
        <canvas id="topicsChart"></canvas>
      </div>
    </div>
  </div>

  <!-- Selector país -->
  <div class="card p-3 shadow-sm mt-4">
    <h5>Análisis por país</h5>

    <select id="countrySelect" class="form-select mb-3"></select>

    <p id="countryResult"></p>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="app.js"></script>

</body>
</html>
